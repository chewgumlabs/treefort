<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treefort</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="tree-world" id="tree-world">
      <div class="tree-world-stack" id="sky-stack" aria-hidden="true"></div>

      <div class="tree-world-layer tree-world-layer--tree" id="tree-build-layer" aria-hidden="true"></div>

      <div class="door-field" id="door-field">
        <h1 class="sr-only" id="tree-title">Treefort doors</h1>
      </div>

      <div class="hub-footer">
        <p class="hub-title" id="hero-title">Treefort</p>
        <p class="hub-lede" id="hero-lede">The giant tree with everyone's door on it.</p>
      </div>
    </div>

    <div class="modal-shell hidden" id="door-modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="close-button" id="close-modal" type="button" aria-label="Close">x</button>
        <p class="modal-kicker" id="modal-kicker">Door</p>
        <h2 id="modal-title">Door state</h2>
        <p id="modal-message"></p>
        <div class="modal-actions hidden" id="modal-links">
          <a class="action-link hidden" id="modal-primary-link" href="#">Continue</a>
          <a class="secondary-link hidden" id="modal-secondary-link" href="#">Learn more</a>
        </div>
        <form class="knock-form hidden" id="knock-form">
          <label for="passphrase" class="input-label">Who's there?</label>
          <input id="passphrase" name="passphrase" type="password" autocomplete="off" spellcheck="false" />
          <p class="fine-print" id="knock-hint"></p>
          <button class="action-button" type="submit">Open the door</button>
        </form>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
