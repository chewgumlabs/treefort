<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treefort</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="tree-world" id="tree-world">
      <div class="tree-world-stack" id="sky-stack" aria-hidden="true"></div>

      <div class="tree-world-layer tree-world-layer--tree" id="tree-build-layer" aria-hidden="true"></div>

      <div class="door-field" id="door-field">
        <h1 class="sr-only" id="tree-title">Treefort doors</h1>
      </div>

    </div>

    <div class="modal-shell hidden" id="door-modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="close-button" id="close-modal" type="button" aria-label="Close">x</button>
        <p class="modal-kicker" id="modal-kicker">Door</p>
        <h2 id="modal-title">Door state</h2>
        <p id="modal-message"></p>
        <div class="modal-actions hidden" id="modal-links">
          <a class="action-link hidden" id="modal-primary-link" href="#">Continue</a>
          <a class="secondary-link hidden" id="modal-secondary-link" href="#">Learn more</a>
        </div>
        <form class="knock-form hidden" id="knock-form">
          <label for="passphrase" class="input-label">Who's there?</label>
          <input id="passphrase" name="passphrase" type="password" autocomplete="off" spellcheck="false" />
          <p class="fine-print" id="knock-hint"></p>
          <button class="action-button" type="submit">Open the door</button>
        </form>
      </section>
    </div>

    <div class="gum-dialog hidden" id="gum-dialog" role="dialog" aria-label="Gum says">
      <div class="gum-dialog__backdrop"></div>
      <div class="gum-dialog__box">
        <img class="gum-dialog__portrait" id="gum-dialog-portrait" src="" alt="Gum" />
        <div class="gum-dialog__content">
          <p class="gum-dialog__speaker">Gum</p>
          <p class="gum-dialog__text" id="gum-dialog-text"></p>
          <div class="gum-dialog__actions" id="gum-dialog-actions"></div>
        </div>
      </div>
    </div>

    <div class="sbook-viewer hidden" id="sbook-viewer" role="dialog" aria-label="Sticker book">
      <div class="sbook-viewer__backdrop" id="sbook-viewer-close"></div>
      <div class="sbook-viewer__book">
        <button class="sbook-viewer__x" id="sbook-viewer-x" type="button" aria-label="Close">&times;</button>
        <p class="sbook-viewer__owner" id="sbook-viewer-owner"></p>
        <div class="sbook-viewer__page" id="sbook-viewer-page"></div>
        <div class="sbook-viewer__nav">
          <button class="sbook-viewer__arrow" id="sbook-viewer-left" type="button" aria-label="Previous">&lt;</button>
          <p class="sbook-viewer__pagenum" id="sbook-viewer-pagenum">1 / 1</p>
          <button class="sbook-viewer__arrow" id="sbook-viewer-right" type="button" aria-label="Next">&gt;</button>
        </div>
      </div>
    </div>

    <script src="./app.js?v=20260313c"></script>
  </body>
</html>
