name: Wipe Expired Guest Rooms

on:
  schedule:
    - cron: '0 5 * * *' # 5 AM UTC daily (midnight ET)
  workflow_dispatch: {} # manual trigger

permissions:
  contents: write

jobs:
  wipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check and wipe expired guest rooms
        run: node scripts/wipe-expired-guests.mjs

      - name: Commit changes if any
        run: |
          git config user.name "treefort-bot"
          git config user.email "treefort-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No expired rooms to wipe."
          else
            git commit -m "Wipe expired guest rooms [automated]"
            git push
          fi
